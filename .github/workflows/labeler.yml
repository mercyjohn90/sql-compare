name: Pull Request Labeler
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-labels') && !contains(github.event.pull_request.title, '[no-labels]') && !contains(github.event.pull_request.body, '[no-labels]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          sync-labels: true
